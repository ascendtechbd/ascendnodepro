<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Node Pro v6.5 Global</title>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
      import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA4PHqC-Ih4F4tpupQytorLUrS6768w5aE",
        databaseURL: "https://nodepro-c097e-default-rtdb.asia-southeast1.firebasedatabase.app/"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // কমান্ড পাঠানোর ফাংশন
      window.updateDevice = (path, val) => {
        set(ref(db, path), val);
      };

      // ফায়ারবেস থেকে সব ডাটা রিয়েল-টাইমে পড়া
      onValue(ref(db, "/"), (snap) => {
        const data = snap.val();
        if(!data) return;

        // সুইচ আপডেট
        document.getElementById('sw1').checked = data.L1;
        document.getElementById('sw2').checked = data.L2;
        
        // অটোমেশন ও অ্যালার্ম স্টেট আপডেট
        document.getElementById('alarm_time').value = data.alarmTime || "06:30";
        document.getElementById('l1_on').value = data.l1On || "00:00";
        document.getElementById('l1_off').value = data.l1Off || "00:00";
        
        // কানেকশন স্ট্যাটাস
        document.getElementById('conStatus').innerText = "● GLOBAL ONLINE";
        document.getElementById('conStatus').style.color = "#30D158";
      });

      // ঘড়ি আপডেট (ডিভাইস টাইম এর বদলে ব্রাউজার টাইম দিয়ে সিমুলেট করা হচ্ছে)
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
      }, 1000);
    </script>

    <style>
        :root { --bg: #000000; --card: rgba(255,255,255,0.06); --accent: #0A84FF; --success: #30D158; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        
        .header { margin-bottom: 25px; }
        #clock { font-size: 48px; font-weight: 200; letter-spacing: -2px; margin: 10px 0; }
        #conStatus { font-size: 12px; font-weight: 700; color: #ff3b30; }

        .glass-card {
            background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        
        .row { display: flex; justify-content: space-between; align-items: center; }
        h3 { margin: 0; font-size: 17px; font-weight: 600; }
        
        /* Inputs & Switches */
        input[type="time"] { 
            background: rgba(255,255,255,0.1); border: none; color: white; 
            padding: 8px; border-radius: 10px; font-family: inherit;
        }
        .switch { position: relative; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(22px); }

        .automation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .auto-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div id="conStatus">● SYNCING...</div>
            <div id="clock">00:00:00</div>
            <p style="opacity: 0.5; font-size: 14px;">Ascend Node Pro v6.5 Global</p>
        </div>

        <div class="glass-card">
            <div class="row">
                <h3>Light (Load 1)</h3>
                <label class="switch">
                    <input type="checkbox" id="sw1" onchange="updateDevice('L1_CMD', this.checked ? 1 : 0)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="glass-card">
            <div class="row">
                <h3>Fan (Load 2)</h3>
                <label class="switch">
                    <input type="checkbox" id="sw2" onchange="updateDevice('L2_CMD', this.checked ? 1 : 0)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="glass-card">
            <div class="row">
                <h3>Smart Alarm</h3>
                <input type="time" id="alarm_time" onchange="updateDevice('alarmTime', this.value)">
            </div>
        </div>

        <div class="glass-card">
            <h3>Load 1 Automation</h3>
            <div class="automation-grid">
                <div class="auto-item">
                    <span>ON Time:</span><br>
                    <input type="time" id="l1_on" onchange="updateDevice('l1On', this.value)" style="width: 100%; margin-top: 5px;">
                </div>
                <div class="auto-item">
                    <span>OFF Time:</span><br>
                    <input type="time" id="l1_off" onchange="updateDevice('l1Off', this.value)" style="width: 100%; margin-top: 5px;">
                </div>
            </div>
        </div>

        <p style="text-align: center; font-size: 10px; color: rgba(255,255,255,0.2);">
            DESIGNED BY ASCEND TECH BD
        </p>
    </div>
</body>
</html>
